<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الكتب</title>

<style>
body { font-family: Tahoma; margin:0; background:#f4f6f9; }
header {
  background:#111; color:white; padding:15px;
  display:flex; justify-content:space-between;
}
.cart { background:#ff6600; padding:8px 15px; border-radius:20px; cursor:pointer; }
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px; padding:20px;
}
.book {
  background:white; padding:15px; border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center;
}
.book img {
  width:100%; height:260px; object-fit:cover; border-radius:10px;
}
button {
  background:#ff6600; color:white; border:none;
  padding:10px; margin-top:10px; cursor:pointer;
  border-radius:8px; width:100%;
}
.cart-box {
  position:fixed; top:0; right:-100%; width:300px;
  height:100%; background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,0.2);
  padding:20px; transition:0.4s;
}
.cart-box.active { right:0; }
.checkout { background:green; }
</style>

</head>

<body>

<header>
  📚 متجر الكتب
  <div class="cart" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</header>

<div class="container" id="books"></div>

<div class="cart-box" id="cartBox">
  <h3>سلة المشتريات</h3>
  <div id="cartItems"></div>
  <button class="checkout" onclick="checkout()">إتمام الطلب</button>
</div>

<script>
let cart = [];
let books = JSON.parse(localStorage.getItem("books")) || [];

function displayBooks() {
  let container = document.getElementById("books");
  container.innerHTML = "";
  books.forEach((book, index) => {
    container.innerHTML += `
      <div class="book">
        <img src="${book.img}">
        <h3>${book.name}</h3>
        <p>${book.price} جنيه</p>
        <button onclick="addToCart(${index})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(index) {
  cart.push(books[index]);
  updateCart();
}

function updateCart() {
  document.getElementById("count").innerText = cart.length;
  let items = "";
  cart.forEach(item => {
    items += `<div>${item.name} - ${item.price} جنيه</div>`;
  });
  document.getElementById("cartItems").innerHTML = items;
}

function toggleCart() {
  document.getElementById("cartBox").classList.toggle("active");
}

function checkout() {
  let message = "طلب كتب:%0A";
  cart.forEach(item => {
    message += item.name + " - " + item.price + " جنيه%0A";
  });

  window.open("https://wa.me/201XXXXXXXXX?text=" + message);
}

displayBooks();
</script>

</body>
</html>
